<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<link rel="manifest" href="manifest.json" />
<meta name="theme-color" content="#1f6b47" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="골프내기" />
<title>골프 내기 기록</title>
<style>
:root{--bg1:#1f6b47;--bg2:#174d35;--bg3:#0f2d22;--line:#e5e7eb;--text:#111827;--muted:#6b7280}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;color:var(--text);background:radial-gradient(circle at top,var(--bg1) 0%,var(--bg2) 42%,var(--bg3) 100%);min-height:100vh}
.wrap{max-width:430px;margin:0 auto;padding:8px 8px 18px}
.card{background:rgba(255,255,255,.94);border-radius:24px;box-shadow:0 18px 34px rgba(0,0,0,.18);overflow:hidden;margin-top:8px}

/* 세팅 패널 */
.setting-panel{background:rgba(255,255,255,.94);border-radius:24px;box-shadow:0 18px 34px rgba(0,0,0,.18);margin-top:8px;overflow:hidden;transition:opacity 0.3s}
.setting-panel.locked{opacity:0.6}
.setting-panel.locked .setting-body{pointer-events:none}
.setting-header{display:flex;justify-content:space-between;align-items:center;padding:12px 14px 10px}
.setting-title{font-size:13px;font-weight:900;color:#047857}
.setting-lock-btn{height:30px;border-radius:10px;border:1px solid #d1d5db;background:#fff;font-size:10px;font-weight:900;color:#475569;cursor:pointer;padding:0 12px;user-select:none}
.setting-lock-btn.locked{background:#111827;color:#fff;border-color:#111827}
.setting-body{padding:0 10px 12px}

.grid2{display:grid;gap:6px;grid-template-columns:1fr 1fr}
input{width:100%;height:38px;border-radius:14px;border:1px solid var(--line);padding:0 12px;font-size:13px;background:#fff;color:var(--text);outline:none}
.block{background:#f8fafc;border-radius:16px;padding:10px;border:1px solid #e5e7eb;margin-top:6px}
/* 서브 헤드 레이블 — 3pt 크게, 볼드 */
.label{font-size:13px;font-weight:700;color:#374151;margin:0 0 6px 2px}
.head{padding:12px;border-bottom:1px solid #f1f5f9;display:flex;flex-direction:column;gap:8px}
.hole{font-size:28px;font-weight:900;line-height:1}
.inner{padding:12px}
.btn{height:40px;border:none;border-radius:16px;padding:0 10px;font-size:12px;font-weight:800;cursor:pointer}
.btn.primary{background:#10b981;color:#fff}
.btn:disabled,.mini:disabled,.step:disabled{opacity:.42;cursor:not-allowed}
.roundToggles,.flagToggles{display:flex;gap:6px;margin-top:6px}
.mini{flex:1;height:30px;border-radius:12px;border:1px solid #d1d5db;background:#fff;font-size:10px;font-weight:800;color:#475569;cursor:pointer}
.mini.active{background:#111827;color:#fff;border-color:#111827}
.scoreGrid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:8px}
.scoreBox{border:1px solid #e5e7eb;border-radius:18px;background:#fafaf9;padding:8px}
.scoreName{font-size:11px;font-weight:700;color:#6b7280;margin-bottom:6px}
.stepRow{display:grid;grid-template-columns:34px 1fr 34px;gap:6px;align-items:center}
.step{height:36px;border-radius:14px;border:1px solid #d1d5db;background:#fff;font-size:18px;font-weight:900;color:#374151;cursor:pointer}
.scoreVal{height:36px;border-radius:14px;background:#fff;border:1px solid #e5e7eb;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:900;color:#111827}
.settle{border:1px solid #d1fae5;background:linear-gradient(90deg,#ecfdf5,#f7fee7);border-radius:20px;padding:11px;margin-top:8px}
.settle .k{font-size:10px;font-weight:700;color:#047857}.settle .v{font-size:15px;font-weight:900;line-height:1.35;color:#064e3b;margin-top:4px;white-space:pre-line}
.holesWrap{margin-top:8px}.holes{display:grid;grid-template-columns:repeat(6,1fr);gap:6px}
.holeBtn{height:36px;border-radius:14px;border:1px solid #e5e7eb;background:#fff;font-size:11px;font-weight:900;color:#374151;cursor:pointer}
.holeBtn.active{background:#047857;color:#fff;border-color:#047857}.holeBtn.done{background:#ecfdf5;color:#047857;border-color:#bbf7d0}
.totals{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:8px}
.total{background:rgba(255,255,255,.94);border-radius:18px;padding:10px;box-shadow:0 10px 24px rgba(0,0,0,.12)}
.total .cap{font-size:10px;color:var(--muted)}.total .name{font-size:12px;font-weight:700;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.total .money{font-size:18px;font-weight:900;margin-top:3px;color:#e11d48}
.btn.disabledVisual{background:#9ca3af!important;color:#e5e7eb!important}
.mini.disabledVisual{opacity:.35;background:#e5e7eb;color:#9ca3af;border-color:#e5e7eb}
.autocomplete-wrap{position:relative}
.autocomplete-list{position:absolute;top:100%;left:0;right:0;background:#fff;border:1px solid #d1d5db;border-radius:14px;box-shadow:0 8px 24px rgba(0,0,0,.12);z-index:999;max-height:200px;overflow-y:auto;margin-top:4px}
.autocomplete-item{padding:10px 14px;font-size:13px;cursor:pointer;color:#111827;border-radius:8px}
.autocomplete-item:hover{background:#f0fdf4;color:#047857;font-weight:700}
.drum-item{height:42px;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:800;color:#9ca3af;user-select:none;scroll-snap-align:center}
.drum-item.selected{color:#111827;font-size:21px}
#hourDrum::-webkit-scrollbar,#minDrum::-webkit-scrollbar,#handyDrum::-webkit-scrollbar{display:none}
.handy-grid{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:4px;margin-top:6px}
.handy-btn{height:38px;border-radius:14px;border:1px solid #e5e7eb;background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:space-between;padding:0 8px;width:100%}
.handy-btn .hname{font-size:11px;color:#6b7280;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.handy-btn .hval{font-size:13px;font-weight:900;color:#047857;background:#dcfce7;border-radius:8px;padding:2px 6px;flex-shrink:0}
.grid4names{display:grid;gap:4px;grid-template-columns:1fr 1fr 1fr 1fr;margin-top:6px}
</style>
</head>
<body>
<div class="wrap">

  <!-- 팝업들 -->
  <div id="timePickerOverlay" style="display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);z-index:9999;align-items:flex-end;justify-content:center">
    <div style="background:#fff;border-radius:24px 24px 0 0;padding:20px;width:100%;max-width:430px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
        <button onclick="closeTimePicker()" style="background:none;border:none;font-size:14px;color:#6b7280;cursor:pointer;font-weight:800;padding:4px 8px">취소</button>
        <span style="font-size:15px;font-weight:900;color:#111827">티오프 시간</span>
        <button onclick="confirmTimePicker()" style="background:none;border:none;font-size:14px;color:#10b981;cursor:pointer;font-weight:900;padding:4px 8px">확인 ✓</button>
      </div>
      <div style="display:flex;align-items:center;justify-content:center;gap:10px">
        <div style="flex:1;position:relative;height:150px;overflow:hidden;border:1px solid #e5e7eb;border-radius:16px;background:#f8fafc">
          <div style="position:absolute;top:0;left:0;right:0;height:48px;background:linear-gradient(to bottom,#f8fafc,transparent);z-index:2;pointer-events:none"></div>
          <div style="position:absolute;bottom:0;left:0;right:0;height:48px;background:linear-gradient(to top,#f8fafc,transparent);z-index:2;pointer-events:none"></div>
          <div style="position:absolute;top:50%;left:0;right:0;height:42px;transform:translateY(-50%);border-top:2px solid #10b981;border-bottom:2px solid #10b981;z-index:1;pointer-events:none"></div>
          <div id="hourDrum" style="overflow-y:scroll;height:150px;scrollbar-width:none;scroll-snap-type:y mandatory;-webkit-overflow-scrolling:touch"></div>
        </div>
        <span style="font-size:28px;font-weight:900;color:#374151;flex-shrink:0">:</span>
        <div style="flex:1;position:relative;height:150px;overflow:hidden;border:1px solid #e5e7eb;border-radius:16px;background:#f8fafc">
          <div style="position:absolute;top:0;left:0;right:0;height:48px;background:linear-gradient(to bottom,#f8fafc,transparent);z-index:2;pointer-events:none"></div>
          <div style="position:absolute;bottom:0;left:0;right:0;height:48px;background:linear-gradient(to top,#f8fafc,transparent);z-index:2;pointer-events:none"></div>
          <div style="position:absolute;top:50%;left:0;right:0;height:42px;transform:translateY(-50%);border-top:2px solid #10b981;border-bottom:2px solid #10b981;z-index:1;pointer-events:none"></div>
          <div id="minDrum" style="overflow-y:scroll;height:150px;scrollbar-width:none;scroll-snap-type:y mandatory;-webkit-overflow-scrolling:touch"></div>
        </div>
      </div>
      <div style="text-align:center;margin-top:14px;font-size:24px;font-weight:900;color:#111827" id="timeDisplay">07:00</div>
    </div>
  </div>

  <div id="handyPickerOverlay" style="display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);z-index:9999;align-items:flex-end;justify-content:center">
    <div style="background:#fff;border-radius:24px 24px 0 0;padding:20px;width:100%;max-width:430px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
        <button onclick="closeHandyPicker()" style="background:none;border:none;font-size:14px;color:#6b7280;cursor:pointer;font-weight:800;padding:4px 8px">취소</button>
        <span style="font-size:15px;font-weight:900;color:#111827" id="handyPickerTitle">핸디</span>
        <button onclick="confirmHandyPicker()" style="background:none;border:none;font-size:14px;color:#10b981;cursor:pointer;font-weight:900;padding:4px 8px">확인 ✓</button>
      </div>
      <div style="display:flex;justify-content:center">
        <div style="width:140px;position:relative;height:150px;overflow:hidden;border:1px solid #e5e7eb;border-radius:16px;background:#f8fafc">
          <div style="position:absolute;top:0;left:0;right:0;height:48px;background:linear-gradient(to bottom,#f8fafc,transparent);z-index:2;pointer-events:none"></div>
          <div style="position:absolute;bottom:0;left:0;right:0;height:48px;background:linear-gradient(to top,#f8fafc,transparent);z-index:2;pointer-events:none"></div>
          <div style="position:absolute;top:50%;left:0;right:0;height:42px;transform:translateY(-50%);border-top:2px solid #10b981;border-bottom:2px solid #10b981;z-index:1;pointer-events:none"></div>
          <div id="handyDrum" style="overflow-y:scroll;height:150px;scrollbar-width:none;scroll-snap-type:y mandatory;-webkit-overflow-scrolling:touch"></div>
        </div>
      </div>
      <div style="text-align:center;margin-top:14px;font-size:24px;font-weight:900;color:#047857" id="handyDisplay">0</div>
    </div>
  </div>

  <!-- 세팅 패널 -->
  <div class="setting-panel" id="settingPanel">
    <div class="setting-header">
      <span class="setting-title">⚙️ 세팅</span>
      <button class="setting-lock-btn" id="settingLockBtn" onclick="toggleSettingLock()">잠금</button>
    </div>
    <div class="setting-body">
      <div class="grid2">
        <div class="block" style="margin-top:0"><div class="label">날짜</div><input id="dateInput" type="date"></div>
        <div class="block" style="margin-top:0">
          <div class="label">티오프</div>
          <input id="timeInput" type="text" readonly placeholder="시간 선택 ▾" onclick="openTimePicker()" style="cursor:pointer;caret-color:transparent;background:#fff;font-weight:800;color:#111827"/>
        </div>
      </div>
      <div class="block autocomplete-wrap">
        <div class="label">골프장</div>
        <input id="courseInput" placeholder="골프장 이름 검색" autocomplete="off">
        <div class="autocomplete-list" id="courseList" style="display:none"></div>
      </div>
      <div class="block">
        <div class="label">판돈</div>
        <input id="stakeInput" inputmode="numeric" placeholder="예: 20000">
      </div>
      <div class="block">
        <div class="label">오늘의 선수</div>
        <div class="grid4names">
          <input id="nameA" placeholder="A" style="padding:0 6px;font-size:13px;text-align:center">
          <input id="nameB" placeholder="B" style="padding:0 6px;font-size:13px;text-align:center">
          <input id="nameC" placeholder="C" style="padding:0 6px;font-size:13px;text-align:center">
          <input id="nameD" placeholder="D" style="padding:0 6px;font-size:13px;text-align:center">
        </div>
      </div>
      <div class="block">
        <div class="label">땡그랑</div>
        <div class="roundToggles" style="margin-top:0">
          <button class="mini" id="ddangRuleBtn">인정</button>
        </div>
        <div style="margin-top:12px">
          <div class="label">핸디</div>
          <div class="handy-grid" id="handyGrid"></div>
        </div>
        <div style="margin-top:12px">
          <div class="label">방식 비율</div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:4px" id="ratioGrid">
            <button class="mini active" id="ratio-random" onclick="setRatio('random')">완전 랜덤</button>
            <button class="mini" id="ratio-even" onclick="setRatio('even')">균등</button>
            <button class="mini" id="ratio-solo" onclick="setRatio('solo')">개인전 위주</button>
            <button class="mini" id="ratio-22" onclick="setRatio('22')">2vs2 위주</button>
            <button class="mini" id="ratio-13" onclick="setRatio('13')">1vs3 위주</button>
            <button class="mini" id="ratio-custom" onclick="setRatio('custom')">커스텀</button>
          </div>
          <div id="customRatioWrap" style="display:none;margin-top:10px;padding:10px;background:#fff;border-radius:12px;border:1px solid #e5e7eb">
            <div style="display:flex;flex-direction:column;gap:10px">
              <div style="display:flex;align-items:center;gap:8px">
                <span style="font-size:11px;font-weight:800;color:#6b7280;width:52px;flex-shrink:0">개인전</span>
                <input type="range" id="sliderSolo" min="0" max="100" value="33" oninput="updateCustomRatio('solo')" style="flex:1;accent-color:#10b981">
                <span style="font-size:12px;font-weight:900;color:#111827;width:34px;text-align:right" id="valSolo">33%</span>
              </div>
              <div style="display:flex;align-items:center;gap:8px">
                <span style="font-size:11px;font-weight:800;color:#6b7280;width:52px;flex-shrink:0">2vs2</span>
                <input type="range" id="slider22" min="0" max="100" value="33" oninput="updateCustomRatio('22')" style="flex:1;accent-color:#10b981">
                <span style="font-size:12px;font-weight:900;color:#111827;width:34px;text-align:right" id="val22">33%</span>
              </div>
              <div style="display:flex;align-items:center;gap:8px">
                <span style="font-size:11px;font-weight:800;color:#6b7280;width:52px;flex-shrink:0">1vs3</span>
                <input type="range" id="slider13" min="0" max="100" value="34" oninput="updateCustomRatio('13')" style="flex:1;accent-color:#10b981">
                <span style="font-size:12px;font-weight:900;color:#111827;width:34px;text-align:right" id="val13">34%</span>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- 게임 카드 -->
  <div class="card">
    <div class="head">
      <div style="display:flex;gap:6px;align-items:center">
        <div class="hole" id="holeText">1</div>
        <div style="display:flex;gap:5px;flex:1;min-width:0">
          <button id="spinBtn" onclick="spinCurrentMode()" style="width:100px;flex-shrink:0;height:40px;border-radius:12px;border:none;background:#10b981;cursor:pointer;overflow:hidden;position:relative;padding:0">
            <div style="position:absolute;top:0;left:0;right:0;height:10px;background:linear-gradient(to bottom,rgba(0,0,0,0.15),transparent);z-index:2;pointer-events:none"></div>
            <div style="position:absolute;bottom:0;left:0;right:0;height:10px;background:linear-gradient(to top,rgba(0,0,0,0.15),transparent);z-index:2;pointer-events:none"></div>
            <div id="spinSlot" style="display:flex;flex-direction:column;will-change:transform">
              <div style="height:40px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:900;color:#fff;letter-spacing:0.3px">🎰 방식생성</div>
            </div>
          </button>
          <button id="par3Btn" onclick="togglePar3()" style="width:48px;height:40px;border-radius:12px;border:1px solid #e5e7eb;background:#f8fafc;font-size:10px;font-weight:900;color:#475569;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center">PAR3</button>
          <button id="lockToggleBtn" onclick="toggleLockCurrent()" style="width:48px;height:40px;border-radius:12px;border:1px solid #e5e7eb;background:#f8fafc;font-size:10px;font-weight:900;color:#475569;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center">LOCK</button>
        </div>
        <div style="flex-shrink:0;min-width:80px;height:40px;display:flex;align-items:center;justify-content:flex-end">
          <div id="potText" style="font-size:22px;font-weight:900;color:#d97706;white-space:nowrap">0원</div>
        </div>
      </div>
      <div id="teamBox" style="background:#f8fafc;border-radius:12px;height:40px;display:flex;align-items:center;justify-content:center;border:1px solid #e5e7eb">
        <div id="teamText" style="font-size:13px;font-weight:900;color:#9ca3af;letter-spacing:0.3px;line-height:1">방식을 생성해주세요</div>
      </div>
    </div>
    <div class="inner">
      <div class="scoreGrid" id="scoreGrid"></div>
      <div class="settle"><div class="k">자동 정산</div><div class="v" id="settlementText">방식을 생성하고 점수를 입력해 주세요.</div></div>
      <div class="holesWrap">
        <div style="font-size:10px;font-weight:700;color:#6b7280;margin-bottom:6px">홀 이동</div>
        <div class="holes" id="holesGrid"></div>
      </div>
    </div>
  </div>

  <div class="totals">
    <div class="total"><div class="cap">누적 지출</div><div class="name" id="totalNameA">A</div><div class="money" id="totalA">-0원</div></div>
    <div class="total"><div class="cap">누적 지출</div><div class="name" id="totalNameB">B</div><div class="money" id="totalB">-0원</div></div>
    <div class="total"><div class="cap">누적 지출</div><div class="name" id="totalNameC">C</div><div class="money" id="totalC">-0원</div></div>
    <div class="total"><div class="cap">누적 지출</div><div class="name" id="totalNameD">D</div><div class="money" id="totalD">-0원</div></div>
  </div>
</div>

<script>
const PLAYERS=["A","B","C","D"];
const MIN_SCORE=-1,MAX_SCORE=5;
const MODES=[
  {mode:"개인전",team:"A vs B vs C vs D"},
  {mode:"2:2",team:"A+B vs C+D"},
  {mode:"2:2",team:"A+C vs B+D"},
  {mode:"2:2",team:"A+D vs B+C"},
  {mode:"1:3",team:"A vs B+C+D"},
  {mode:"1:3",team:"B vs A+C+D"},
  {mode:"1:3",team:"C vs A+B+D"},
  {mode:"1:3",team:"D vs A+B+C"}
];

function emptyFlags(){return {near:false,ddang:false,ok:false};}
function makeRows(){return Array.from({length:18},(_,i)=>({hole:i+1,mode:"미정",team:"",A:"",B:"",C:"",D:"",locked:false,par3:false,carryIn:0,appliedPot:0,winner:"",settlement:"",flags:{A:emptyFlags(),B:emptyFlags(),C:emptyFlags(),D:emptyFlags()}}));}
function parseStake(v){const n=Number(String(v||"").replace(/[^0-9]/g,""));return Number.isFinite(n)?n:0;}
function money(v){return `${Math.round(v||0).toLocaleString("ko-KR")}원`;}
function displayName(names,p){return names[p]||p;}
function prettyText(text,names){if(!text)return "";return String(text).replace(/[ABCD]/g,m=>names[m]||m);}
function score(v){if(v===""||v==null)return null;const n=Number(v);return Number.isFinite(n)?n:null;}
function clampScore(n){return Math.max(MIN_SCORE,Math.min(MAX_SCORE,n));}
function hasBirdie(row){return PLAYERS.some(p=>score(row[p])===-1);}
function flagRank(f){if(state.rules.ddangEnabled&&f.ddang)return 2;if(f.ok)return 1;return 0;}
function compareRank(a,b,row){
  const sa=score(row[a]),sb=score(row[b]);
  if(sa!==sb)return sa-sb;
  const fa=row.flags[a],fb=row.flags[b];
  const ra=flagRank(fa),rb=flagRank(fb);
  if(ra!==rb)return rb-ra;
  const na=(row.par3&&fa.near)?1:0,nb=(row.par3&&fb.near)?1:0;
  if(na!==nb)return nb-na;
  return 0;
}
function get13Calc(row){
  const [solo,teamText]=row.team.split(" vs ");
  const trio=teamText.split("+");
  const soloScore=score(row[solo]);
  if(soloScore===null||trio.some(p=>score(row[p])===null))return null;
  const ranked=[...trio].sort((a,b)=>compareRank(a,b,row));
  return {solo,ranked,soloWeighted:soloScore*2,trioBestTwo:score(row[ranked[0]])+score(row[ranked[1]])};
}
function getWinner(row){
  const s={A:score(row.A),B:score(row.B),C:score(row.C),D:score(row.D)};
  if(Object.values(s).some(v=>v===null))return "";
  if(row.mode==="개인전"){
    const min=Math.min(...Object.values(s));
    const leaders=PLAYERS.filter(p=>s[p]===min);
    if(leaders.length===1)return leaders[0];
    const ranked=[...leaders].sort((a,b)=>compareRank(a,b,row));
    return compareRank(ranked[0],ranked[1],row)!==0?ranked[0]:"무승부";
  }
  if(row.mode==="2:2"){
    const [left,right]=row.team.split(" vs ");
    const lps=left.split("+"),rps=right.split("+");
    const ls=lps.reduce((a,p)=>a+s[p],0),rs=rps.reduce((a,p)=>a+s[p],0);
    if(ls!==rs)return ls<rs?left:right;
    const lr=[...lps].sort((a,b)=>compareRank(a,b,row));
    const rr=[...rps].sort((a,b)=>compareRank(a,b,row));
    const c1=compareRank(lr[0],rr[0],row);if(c1!==0)return c1<0?left:right;
    const c2=compareRank(lr[1],rr[1],row);if(c2!==0)return c2<0?left:right;
    return "무승부";
  }
  if(row.mode==="1:3"){
    const calc=get13Calc(row);if(!calc)return "";
    if(calc.soloWeighted!==calc.trioBestTwo)return calc.soloWeighted<calc.trioBestTwo?calc.solo:row.team.split(" vs ")[1];
    return "무승부";
  }
  return "";
}
function recomputeRows(){
  const stake=parseStake(state.meta.stake);
  let carry=0;
  state.rows.forEach(row=>{
    row.carryIn=carry;
    const base=stake+carry;
    row.appliedPot=hasBirdie(row)?base*2:base;
    row.winner="";row.settlement="";
    if(row.mode==="미정")return;
    const winner=getWinner(row);
    row.winner=winner;
    if(!winner){row.settlement="점수를 모두 입력해 주세요.";return;}
    if(winner==="무승부"){row.settlement=`승부: 무승부 · 다음 홀에 +${money(stake)} 이월`;carry+=stake;return;}
    const lines=[];const pot=row.appliedPot;
    if(row.mode==="개인전"){
      const ranked=[...PLAYERS].sort((a,b)=>compareRank(a,b,row));
      lines.push(`승부: ${displayName(state.names,ranked[2])} -${money(pot)} / ${displayName(state.names,ranked[3])} -${money(pot)}`);
    }else if(row.mode==="2:2"){
      const [left,right]=row.team.split(" vs ");
      const losers=(winner===left?right:left).split("+");
      lines.push(`승부: ${displayName(state.names,losers[0])} -${money(pot)} / ${displayName(state.names,losers[1])} -${money(pot)}`);
    }else if(row.mode==="1:3"){
      const calc=get13Calc(row);
      if(winner===calc.solo){lines.push(`승부: ${displayName(state.names,calc.solo)} -${money(pot*3)}`);}
      else{const trio=row.team.split(" vs ")[1].split("+");lines.push(`승부: ${displayName(state.names,trio[0])} -${money(pot)} / ${displayName(state.names,trio[1])} -${money(pot)} / ${displayName(state.names,trio[2])} -${money(pot)}`);}
    }
    if(row.par3){
      const nearWinner=PLAYERS.find(p=>row.flags[p].near);
      if(nearWinner){const losers=PLAYERS.filter(p=>p!==nearWinner).map(p=>`${displayName(state.names,p)} -${money(10000)}`);lines.push(`니어패배자: ${losers.join(" / ")}`);}
      else{lines.push(`니어패배자: 없음`);}
    }
    row.settlement=lines.join("\n");carry=0;
  });
}
function calcTotals(){
  const out={A:0,B:0,C:0,D:0};
  state.rows.forEach(row=>{
    if(!row.winner||row.winner==="무승부")return;
    const pot=row.appliedPot||0;
    if(row.mode==="개인전"){const ranked=[...PLAYERS].sort((a,b)=>compareRank(a,b,row));out[ranked[2]]+=pot;out[ranked[3]]+=pot;}
    else if(row.mode==="2:2"){const [left,right]=row.team.split(" vs ");const losers=(row.winner===left?right:left).split("+");losers.forEach(p=>out[p]+=pot);}
    else if(row.mode==="1:3"){const calc=get13Calc(row);if(row.winner===calc.solo){out[calc.solo]+=pot*3;}else{row.team.split(" vs ")[1].split("+").forEach(p=>out[p]+=pot);}}
    if(row.par3){const nearWinner=PLAYERS.find(p=>row.flags[p].near);if(nearWinner){PLAYERS.filter(p=>p!==nearWinner).forEach(p=>out[p]+=10000);}}
  });
  return out;
}

function togglePar3(){

function toggleFlag(player,flag){
  const row=state.rows.find(r=>r.hole===state.hole);if(row.locked||row.mode==="미정")return;
  const current=row.flags[player][flag];
  if(flag==="near"){
    if(!row.par3)return;
    const wasOn=current;PLAYERS.forEach(p=>row.flags[p].near=false);row.flags[player].near=!wasOn;
  }else{row.flags[player].ddang=false;row.flags[player].ok=false;row.flags[player][flag]=!current;}

function setRatio(mode){

// 커스텀 슬라이더 — 하나 움직이면 나머지 연동
function updateCustomRatio(changed){
  const sEl=document.getElementById('sliderSolo');
  const tEl=document.getElementById('slider22');
  const hEl=document.getElementById('slider13');
  let s=parseInt(sEl.value),t=parseInt(tEl.value),h=parseInt(hEl.value);
  const remain=100-(changed==='solo'?s:changed==='22'?t:h);
  if(changed==='solo'){
    const ratio=t/(t+h)||0.5;
    t=Math.round(remain*ratio);h=remain-t;
    tEl.value=t;hEl.value=h;
  } else if(changed==='22'){
    const ratio=s/(s+h)||0.5;
    s=Math.round(remain*ratio);h=remain-s;
    sEl.value=s;hEl.value=h;
  } else {
    const ratio=s/(s+t)||0.5;
    s=Math.round(remain*ratio);t=remain-s;
    sEl.value=s;tEl.value=t;
  }
  state.ratio.solo=s;state.ratio.r22=t;state.ratio.r13=h;
  document.getElementById('valSolo').textContent=s+'%';
  document.getElementById('val22').textContent=t+'%';
  document.getElementById('val13').textContent=h+'%';
}
window.setRatio=setRatio;
window.updateCustomRatio=updateCustomRatio;

// 슬롯 스핀
function spinCurrentMode(){
  const row=state.rows.find(r=>r.hole===state.hole);
  if(row.locked||state.spinning||row.mode!=="미정")return;
  state.spinning=true;
  const btn=el.spinBtn;
  const track=el.spinSlot;
  const teamEl=document.getElementById('teamText');
  const teamBox=document.getElementById('teamBox');
  btn.style.cursor='default';

  // 비율에 따라 방식 결정
  const r=state.ratio;
  let pick;
  if(r.mode==='random'){
    pick=MODES[Math.floor(Math.random()*MODES.length)];
  } else {
    let solo=33,r22=33,r13=34;
    if(r.mode==='even'){solo=33;r22=33;r13=34;}
    else if(r.mode==='solo'){solo=60;r22=20;r13=20;}
    else if(r.mode==='22'){solo=10;r22=70;r13=20;}
    else if(r.mode==='13'){solo=10;r22=20;r13=70;}
    else if(r.mode==='custom'){solo=r.solo;r22=r.r22;r13=r.r13;}
    const rand=Math.random()*100;
    let modeType=rand<solo?'개인전':rand<solo+r22?'2:2':'1:3';
    const filtered=MODES.filter(m=>m.mode===modeType);
    pick=filtered[Math.floor(Math.random()*filtered.length)];
  }

  const finalLabel=pick.mode==="2:2"?"2 vs 2":pick.mode==="1:3"?"1 vs 3":"개인전";
  const LABELS=["2 vs 2","1 vs 3","개인전"];
  const fi=LABELS.indexOf(finalLabel);
  const reel=[];
  for(let i=0;i<24;i++) reel.push(LABELS[Math.floor(Math.random()*3)]);
  reel.push(LABELS[(fi+1)%3],LABELS[(fi+2)%3],LABELS[(fi+1)%3],LABELS[(fi+2)%3],LABELS[(fi+1)%3],finalLabel);

  teamEl.textContent='';teamBox.style.background='#f8fafc';teamBox.style.border='1px solid #e5e7eb';

  const itemStyle='height:40px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:900;color:#fff;letter-spacing:0.3px';
  track.style.transition='none';
  track.innerHTML=reel.map(l=>`<div style="${itemStyle}">${l}</div>`).join('');
  track.style.transform='translateY(0)';

  function getDelay(i){if(i<=8)return 38;if(i<=16)return 55;if(i<=24)return 80;if(i<=26)return 130;if(i<=28)return 200;if(i<=29)return 320;return 0;}
  function getEase(i){if(i<reel.length-2)return 'linear';if(i===reel.length-2)return 'cubic-bezier(0.33,1,0.68,1)';return 'cubic-bezier(0.34,1.56,0.64,1)';}
  function getDur(i){if(i<reel.length-2)return getDelay(i)*0.75;if(i===reel.length-2)return 400;return 500;}

  let step=0;
  function next(){
    if(step>=reel.length-1){
      setTimeout(()=>{
        state.spinning=false;btn.style.cursor='default';btn.style.background='#047857';
        track.style.transition='none';
        track.innerHTML=`<div style="${itemStyle}">${finalLabel}</div>`;
        track.style.transform='translateY(0)';
        row.mode=pick.mode;row.team=pick.team;row.locked=false;
        teamEl.style.color='#111827';
        teamEl.textContent=prettyText(pick.team,state.names);
        teamBox.style.background='#f0fdf4';teamBox.style.border='1px solid #bbf7d0';
        recomputeRows();render();
      },100);
      return;
    }
    step++;
    track.style.transition=`transform ${getDur(step)}ms ${getEase(step)}`;
    track.style.transform=`translateY(-${step*40}px)`;
    setTimeout(next,getDelay(step));
  }
  setTimeout(next,20);
}

  }

  el.settlementText.textContent=isZero?"방식을 생성하고 점수를 입력해 주세요.":(prettyText(row.settlement,state.names)||"방식을 생성하고 점수를 입력해 주세요.");
  el.scoreGrid.innerHTML=PLAYERS.map(p=>{
    const f=row.flags[p];

  el.holesGrid.innerHTML=state.rows.map(r=>{

  }).join("");
  renderHandyGrid();
}

function getChosung(str){const cho=['ㄱ','ㄲ','ㄴ','ㄷ','ㄸ','ㄹ','ㅁ','ㅂ','ㅃ','ㅅ','ㅆ','ㅇ','ㅈ','ㅉ','ㅊ','ㅋ','ㅌ','ㅍ','ㅎ'];return [...str].map(c=>{const code=c.charCodeAt(0)-0xAC00;if(code<0||code>11171)return c;return cho[Math.floor(code/588)];}).join('');}
function searchCourses(query){if(!query||!query.trim())return [];const q=query.trim();const isChosung=/^[ㄱ-ㅎ]+$/.test(q);return GOLF_COURSES.filter(name=>{if(isChosung)return getChosung(name).startsWith(q);return name.includes(q);}).slice(0,8);}
const courseInput=document.getElementById('courseInput');
const courseList=document.getElementById('courseList');
courseInput.addEventListener('input',function(){const results=searchCourses(this.value);if(results.length===0){courseList.style.display='none';return;}courseList.innerHTML=results.map(name=>`<div class="autocomplete-item" onmousedown="selectCourse('${name.replace(/'/g,"\\'")}')">${name}</div>`).join('');courseList.style.display='block';});
courseInput.addEventListener('blur',function(){setTimeout(()=>{courseList.style.display='none';},150);});
function selectCourse(name){courseInput.value=name;courseList.style.display='none';render();}
window.selectCourse=selectCourse;
window.changeScore=changeScore;
window.toggleFlag=toggleFlag;
window.setHole=setHole;
window.spinCurrentMode=spinCurrentMode;

render();
