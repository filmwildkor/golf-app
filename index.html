<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<link rel="manifest" href="manifest.json" />
<meta name="theme-color" content="#1f6b47" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="골프내기" />
<title>골프 내기 기록</title>
<style>
:root{--bg1:#1f6b47;--bg2:#174d35;--bg3:#0f2d22;--line:#e5e7eb;--text:#111827;--muted:#6b7280}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;color:var(--text);background:radial-gradient(circle at top,var(--bg1) 0%,var(--bg2) 42%,var(--bg3) 100%);min-height:100vh}
.wrap{max-width:430px;margin:0 auto;padding:8px 8px 18px}
.panel,.card{background:rgba(255,255,255,.94);border-radius:24px;box-shadow:0 18px 34px rgba(0,0,0,.18);overflow:hidden;margin-top:8px}
.panel{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);backdrop-filter:blur(12px);padding:10px}
input{width:100%;height:38px;border-radius:14px;border:1px solid var(--line);padding:0 12px;font-size:13px;background:#fff;color:var(--text);outline:none;min-width:0}
.block{background:#fff;border-radius:16px;padding:8px;box-shadow:0 3px 10px rgba(0,0,0,.06);margin-top:6px}
.label{font-size:11px;font-weight:700;color:var(--muted);margin:0 0 4px 2px}
.grid2{display:grid;gap:6px;grid-template-columns:1fr 1fr}
.grid4{display:grid;gap:4px;grid-template-columns:repeat(4,minmax(0,1fr))}
.mini{flex:1;min-width:0;height:30px;border-radius:12px;border:1px solid #d1d5db;background:#fff;font-size:10px;font-weight:800;color:#475569;cursor:pointer;overflow:hidden;white-space:nowrap}
.mini.active{background:#111827;color:#fff;border-color:#111827}
.mini:disabled{opacity:.42;cursor:not-allowed}

/* 세팅 잠금 */
.setting-locked{opacity:0.65;pointer-events:none}

/* 게임카드 헤드 */
.head{padding:12px;border-bottom:1px solid #f1f5f9;display:flex;flex-direction:column;gap:8px}
.hole{font-size:28px;font-weight:900;line-height:1;flex-shrink:0}
.inner{padding:12px}

/* 스코어 */
.scoreGrid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:8px}
.scoreBox{border:1px solid #e5e7eb;border-radius:18px;background:#fafaf9;padding:8px}
.scoreName{font-size:13px;font-weight:700;color:#475569;margin-bottom:6px;text-align:center}
.stepRow{display:grid;grid-template-columns:34px 1fr 34px;gap:6px;align-items:center}
.step{height:36px;border-radius:14px;border:1px solid #d1d5db;background:#fff;font-size:18px;font-weight:900;color:#374151;cursor:pointer}
.step:disabled{opacity:.42;cursor:not-allowed}
.scoreVal{height:36px;border-radius:14px;background:#fff;border:1px solid #e5e7eb;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:900;color:#111827}
.flagToggles{display:flex;gap:4px;margin-top:8px}

/* 정산 */
.settle{border:1px solid #d1fae5;background:linear-gradient(90deg,#ecfdf5,#f7fee7);border-radius:20px;padding:11px;margin-top:8px}
.settle-text{font-size:14px;font-weight:800;line-height:1.5;color:#064e3b;white-space:pre-line}

/* 홀 이동 */
.holesWrap{margin-top:8px}
.holes{display:grid;grid-template-columns:repeat(6,1fr);gap:6px;margin-top:6px}
.holeBtn{height:36px;border-radius:14px;border:1px solid #e5e7eb;background:#fff;font-size:11px;font-weight:900;color:#374151;cursor:pointer}
.holeBtn.active{background:#047857;color:#fff;border-color:#047857}
.holeBtn.done{background:#ecfdf5;color:#047857;border-color:#bbf7d0}

/* 누적 */
.totals{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:8px}
.total{background:rgba(255,255,255,.94);border-radius:18px;padding:10px;box-shadow:0 10px 24px rgba(0,0,0,.12)}
.total .cap{font-size:10px;color:var(--muted)}
.total .name{font-size:12px;font-weight:700;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.total .money{font-size:18px;font-weight:900;margin-top:3px;color:#e11d48}

/* 핸디 */
.handy-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:4px;margin-top:6px}
.handy-btn{height:36px;border-radius:12px;border:1px solid #e5e7eb;background:#f8fafc;cursor:pointer;display:flex;align-items:center;justify-content:space-between;padding:0 6px;width:100%;min-width:0;overflow:hidden}
.handy-btn .hname{font-size:11px;color:#6b7280;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0;flex:1}
.handy-btn .hval{font-size:12px;font-weight:900;color:#047857;background:#dcfce7;border-radius:7px;padding:1px 5px;flex-shrink:0;margin-left:2px}

/* 자동완성 */
.autocomplete-wrap{position:relative}
.autocomplete-list{position:absolute;top:100%;left:0;right:0;background:#fff;border:1px solid #d1d5db;border-radius:14px;box-shadow:0 8px 24px rgba(0,0,0,.12);z-index:999;max-height:200px;overflow-y:auto;margin-top:4px}
.autocomplete-item{padding:10px 14px;font-size:13px;cursor:pointer;color:#111827}
.autocomplete-item:hover{background:#f0fdf4;color:#047857;font-weight:700}

/* 드럼롤 */
.drum-item{height:42px;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:800;color:#9ca3af;user-select:none;scroll-snap-align:center}
.drum-item.selected{color:#111827;font-size:21px}
#hourDrum::-webkit-scrollbar,#minDrum::-webkit-scrollbar,#handyDrum::-webkit-scrollbar{display:none}
</style>
</head>
<body>
<div class="wrap">

<!-- 티오프 팝업 -->
<div id="timePickerOverlay" style="display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);z-index:9999;align-items:flex-end;justify-content:center">
  <div style="background:#fff;border-radius:24px 24px 0 0;padding:20px;width:100%;max-width:430px">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
      <button onclick="closeTimePicker()" style="background:none;border:none;font-size:14px;color:#6b7280;cursor:pointer;font-weight:800">취소</button>
      <span style="font-size:15px;font-weight:900;color:#111827">티오프 시간</span>
      <button onclick="confirmTimePicker()" style="background:none;border:none;font-size:14px;color:#10b981;cursor:pointer;font-weight:900">확인 ✓</button>
    </div>
    <div style="display:flex;align-items:center;justify-content:center;gap:10px">
      <div style="flex:1;position:relative;height:150px;overflow:hidden;border:1px solid #e5e7eb;border-radius:16px;background:#f8fafc">
        <div style="position:absolute;top:0;left:0;right:0;height:48px;background:linear-gradient(to bottom,#f8fafc,transparent);z-index:2;pointer-events:none"></div>
        <div style="position:absolute;bottom:0;left:0;right:0;height:48px;background:linear-gradient(to top,#f8fafc,transparent);z-index:2;pointer-events:none"></div>
        <div style="position:absolute;top:50%;left:0;right:0;height:42px;transform:translateY(-50%);border-top:2px solid #10b981;border-bottom:2px solid #10b981;z-index:1;pointer-events:none"></div>
        <div id="hourDrum" style="overflow-y:scroll;height:150px;scrollbar-width:none;scroll-snap-type:y mandatory;-webkit-overflow-scrolling:touch"></div>
      </div>
      <span style="font-size:28px;font-weight:900;color:#374151;flex-shrink:0">:</span>
      <div style="flex:1;position:relative;height:150px;overflow:hidden;border:1px solid #e5e7eb;border-radius:16px;background:#f8fafc">
        <div style="position:absolute;top:0;left:0;right:0;height:48px;background:linear-gradient(to bottom,#f8fafc,transparent);z-index:2;pointer-events:none"></div>
        <div style="position:absolute;bottom:0;left:0;right:0;height:48px;background:linear-gradient(to top,#f8fafc,transparent);z-index:2;pointer-events:none"></div>
        <div style="position:absolute;top:50%;left:0;right:0;height:42px;transform:translateY(-50%);border-top:2px solid #10b981;border-bottom:2px solid #10b981;z-index:1;pointer-events:none"></div>
        <div id="minDrum" style="overflow-y:scroll;height:150px;scrollbar-width:none;scroll-snap-type:y mandatory;-webkit-overflow-scrolling:touch"></div>
      </div>
    </div>
    <div style="text-align:center;margin-top:14px;font-size:24px;font-weight:900;color:#111827" id="timeDisplay">07:00</div>
  </div>
</div>

<!-- 핸디 팝업 -->
<div id="handyPickerOverlay" style="display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);z-index:9999;align-items:flex-end;justify-content:center">
  <div style="background:#fff;border-radius:24px 24px 0 0;padding:20px;width:100%;max-width:430px">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
      <button onclick="closeHandyPicker()" style="background:none;border:none;font-size:14px;color:#6b7280;cursor:pointer;font-weight:800">취소</button>
      <span style="font-size:15px;font-weight:900;color:#111827" id="handyPickerTitle">핸디</span>
      <button onclick="confirmHandyPicker()" style="background:none;border:none;font-size:14px;color:#10b981;cursor:pointer;font-weight:900">확인 ✓</button>
    </div>
    <div style="display:flex;justify-content:center">
      <div style="width:140px;position:relative;height:150px;overflow:hidden;border:1px solid #e5e7eb;border-radius:16px;background:#f8fafc">
        <div style="position:absolute;top:0;left:0;right:0;height:48px;background:linear-gradient(to bottom,#f8fafc,transparent);z-index:2;pointer-events:none"></div>
        <div style="position:absolute;bottom:0;left:0;right:0;height:48px;background:linear-gradient(to top,#f8fafc,transparent);z-index:2;pointer-events:none"></div>
        <div style="position:absolute;top:50%;left:0;right:0;height:42px;transform:translateY(-50%);border-top:2px solid #10b981;border-bottom:2px solid #10b981;z-index:1;pointer-events:none"></div>
        <div id="handyDrum" style="overflow-y:scroll;height:150px;scrollbar-width:none;scroll-snap-type:y mandatory;-webkit-overflow-scrolling:touch"></div>
      </div>
    </div>
    <div style="text-align:center;margin-top:14px;font-size:24px;font-weight:900;color:#047857" id="handyDisplay">0</div>
  </div>
</div>

<!-- 세팅 패널 -->
<div class="panel" id="settingPanel">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
    <span style="font-size:12px;font-weight:900;color:#d1fae5">⚙️ 세팅</span>
    <button id="settingLockBtn" onclick="toggleSettingLock()" style="height:26px;border-radius:10px;border:1px solid rgba(255,255,255,.3);background:rgba(255,255,255,.12);font-size:10px;font-weight:800;color:#d1fae5;cursor:pointer;padding:0 10px">잠금</button>
  </div>
  <div id="settingBody">
    <div class="grid2">
      <div class="block" style="margin-top:0"><div class="label">날짜</div><input id="dateInput" type="date"></div>
      <div class="block" style="margin-top:0">
        <div class="label">티오프</div>
        <input id="timeInput" type="text" readonly placeholder="시간 선택 ▾" onclick="openTimePicker()" style="cursor:pointer;caret-color:transparent;font-weight:800;color:#111827"/>
      </div>
    </div>
    <div class="block autocomplete-wrap">
      <div class="label">골프장</div>
      <input id="courseInput" placeholder="골프장 이름 검색" autocomplete="off">
      <div class="autocomplete-list" id="courseList" style="display:none"></div>
    </div>
    <div class="block">
      <div class="label">판돈</div>
      <input id="stakeInput" inputmode="numeric" placeholder="예: 20000">
    </div>
    <div class="block">
      <div class="label">오늘의 선수</div>
      <div class="grid4" style="margin-top:4px">
        <input id="nameA" placeholder="A" style="text-align:center;font-weight:700">
        <input id="nameB" placeholder="B" style="text-align:center;font-weight:700">
        <input id="nameC" placeholder="C" style="text-align:center;font-weight:700">
        <input id="nameD" placeholder="D" style="text-align:center;font-weight:700">
      </div>
    </div>
    <div class="block">
      <div class="label">땡그랑</div>
      <div style="display:flex;gap:6px;margin-top:4px">
        <button class="mini" id="ddangRuleBtn" style="height:34px;font-size:11px">인정</button>
      </div>
      <div class="label" style="margin-top:10px">핸디</div>
      <div class="handy-grid" id="handyGrid"></div>
      <div class="label" style="margin-top:10px">방식 비율</div>
      <div style="display:flex;gap:4px;margin-top:4px">
        <button class="mini active" id="ratio-even" onclick="setRatio('even')">균등</button>
        <button class="mini" id="ratio-random" onclick="setRatio('random')">완전랜덤</button>
        <button class="mini" id="ratio-solo" onclick="setRatio('solo')">개인전 위주</button>
        <button class="mini" id="ratio-22" onclick="setRatio('22')">2vs2 위주</button>
        <button class="mini" id="ratio-13" onclick="setRatio('13')">1vs3 위주</button>
      </div>
      <div style="margin-top:10px;display:flex;flex-direction:column;gap:8px">
        <div style="display:flex;align-items:center;gap:8px">
          <span style="font-size:11px;font-weight:700;color:#6b7280;width:42px;flex-shrink:0">개인전</span>
          <input type="range" id="sliderSolo" min="0" max="100" value="33" oninput="updateCustomRatio('solo')" style="flex:1;accent-color:#10b981">
          <span style="font-size:12px;font-weight:900;color:#111827;width:32px;text-align:right" id="valSolo">33%</span>
        </div>
        <div style="display:flex;align-items:center;gap:8px">
          <span style="font-size:11px;font-weight:700;color:#6b7280;width:42px;flex-shrink:0">2vs2</span>
          <input type="range" id="slider22" min="0" max="100" value="33" oninput="updateCustomRatio('22')" style="flex:1;accent-color:#10b981">
          <span style="font-size:12px;font-weight:900;color:#111827;width:32px;text-align:right" id="val22">33%</span>
        </div>
        <div style="display:flex;align-items:center;gap:8px">
          <span style="font-size:11px;font-weight:700;color:#6b7280;width:42px;flex-shrink:0">1vs3</span>
          <input type="range" id="slider13" min="0" max="100" value="34" oninput="updateCustomRatio('13')" style="flex:1;accent-color:#10b981">
          <span style="font-size:12px;font-weight:900;color:#111827;width:32px;text-align:right" id="val13">34%</span>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- 게임 카드 -->
<div class="card">
  <div class="head">
    <div style="display:flex;gap:6px;align-items:center">
      <div style="flex-shrink:0;width:52px">
        <div style="font-size:26px;font-weight:900;line-height:1;color:#111827" id="holeText">1</div>
        <div style="font-size:10px;font-weight:700;color:#9ca3af;margin-top:1px" id="holeProgress">/ 18</div>
      </div>
      <div style="display:flex;gap:5px;flex:1;min-width:0">
        <button id="spinBtn" onclick="spinCurrentMode()" style="width:100px;flex-shrink:0;height:40px;border-radius:12px;border:none;background:#10b981;cursor:pointer;overflow:hidden;position:relative;padding:0">
          <div style="position:absolute;top:0;left:0;right:0;height:9px;background:linear-gradient(to bottom,rgba(0,0,0,0.15),transparent);z-index:2;pointer-events:none"></div>
          <div style="position:absolute;bottom:0;left:0;right:0;height:9px;background:linear-gradient(to top,rgba(0,0,0,0.15),transparent);z-index:2;pointer-events:none"></div>
          <div id="spinSlot" style="display:flex;flex-direction:column;will-change:transform">
            <div style="height:40px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:900;color:#fff;letter-spacing:0.3px">🎰 방식생성</div>
          </div>
        </button>
        <button id="par3Btn" onclick="togglePar3()" style="width:50px;flex-shrink:0;height:40px;border-radius:12px;border:1px solid #e5e7eb;background:#f8fafc;font-size:10px;font-weight:900;color:#475569;cursor:pointer">PAR3</button>
        <button id="lockToggleBtn" onclick="toggleLockCurrent()" style="width:50px;flex-shrink:0;height:40px;border-radius:12px;border:1px solid #e5e7eb;background:#f8fafc;font-size:10px;font-weight:900;color:#475569;cursor:pointer">LOCK</button>
      </div>
      <div style="flex-shrink:0;width:86px;display:flex;align-items:center;justify-content:flex-end">
        <div id="potText" style="font-size:20px;font-weight:900;color:#d97706;white-space:nowrap">0원</div>
      </div>
    </div>
    <div id="teamBox" style="background:#f8fafc;border-radius:12px;height:40px;display:flex;align-items:center;justify-content:center;border:1px solid #e5e7eb">
      <div id="teamText" style="font-size:13px;font-weight:900;color:#9ca3af;letter-spacing:0.2px">방식을 생성해주세요</div>
    </div>
  </div>
  <div class="inner">
    <div class="scoreGrid" id="scoreGrid"></div>
    <div class="settle"><div class="settle-text" id="settlementText">방식을 생성하고 점수를 입력해 주세요.</div></div>
    <div class="holesWrap">
      <div class="label" style="font-weight:700">홀 이동</div>
      <div class="holes" id="holesGrid"></div>
    </div>
  </div>
</div>

<div class="totals">
  <div class="total"><div class="cap">누적 지출</div><div class="name" id="totalNameA">A</div><div class="money" id="totalA">-0원</div></div>
  <div class="total"><div class="cap">누적 지출</div><div class="name" id="totalNameB">B</div><div class="money" id="totalB">-0원</div></div>
  <div class="total"><div class="cap">누적 지출</div><div class="name" id="totalNameC">C</div><div class="money" id="totalC">-0원</div></div>
  <div class="total"><div class="cap">누적 지출</div><div class="name" id="totalNameD">D</div><div class="money" id="totalD">-0원</div></div>
</div>
</div>

<script>
const PLAYERS=["A","B","C","D"];
const MIN_SCORE=-1,MAX_SCORE=5;
const MODES=[
  {mode:"개인전",team:"A vs B vs C vs D"},
  {mode:"2:2",team:"A+B vs C+D"},
  {mode:"2:2",team:"A+C vs B+D"},
  {mode:"2:2",team:"A+D vs B+C"},
  {mode:"1:3",team:"A vs B+C+D"},
  {mode:"1:3",team:"B vs A+C+D"},
  {mode:"1:3",team:"C vs A+B+D"},
  {mode:"1:3",team:"D vs A+B+C"}
];
const RATIO_PRESETS={
  even:  {solo:33,r22:33,r13:34},
  random:{solo:12,r22:38,r13:50},
  solo:  {solo:60,r22:20,r13:20},
  '22':  {solo:10,r22:70,r13:20},
  '13':  {solo:10,r22:20,r13:70},
};

function emptyFlags(){return {near:false,ddang:false,ok:false};}
function makeRows(){return Array.from({length:18},(_,i)=>({hole:i+1,mode:"미정",team:"",A:"",B:"",C:"",D:"",locked:false,par3:false,carryIn:0,appliedPot:0,winner:"",settlement:"",flags:{A:emptyFlags(),B:emptyFlags(),C:emptyFlags(),D:emptyFlags()}}));}
function parseStake(v){const n=Number(String(v||"").replace(/[^0-9]/g,""));return Number.isFinite(n)?n:0;}
function money(v){return `${Math.round(v||0).toLocaleString("ko-KR")}원`;}
function displayName(names,p){return names[p]||p;}
function prettyText(text,names){if(!text)return "";return String(text).replace(/[ABCD]/g,m=>names[m]||m);}
function score(v){if(v===""||v==null)return null;const n=Number(v);return Number.isFinite(n)?n:null;}
function clampScore(n){return Math.max(MIN_SCORE,Math.min(MAX_SCORE,n));}
function hasBirdie(row){return PLAYERS.some(p=>score(row[p])===-1);}
function flagRank(f){if(state.rules.ddangEnabled&&f.ddang)return 2;if(f.ok)return 1;return 0;}
function compareRank(a,b,row){
  const sa=score(row[a]),sb=score(row[b]);
  if(sa!==sb)return sa-sb;
  const fa=row.flags[a],fb=row.flags[b];
  const ra=flagRank(fa),rb=flagRank(fb);
  if(ra!==rb)return rb-ra;
  const na=(row.par3&&fa.near)?1:0,nb=(row.par3&&fb.near)?1:0;
  if(na!==nb)return nb-na;
  return 0;
}
function get13Calc(row){
  const [solo,teamText]=row.team.split(" vs ");
  const trio=teamText.split("+");
  const soloScore=score(row[solo]);
  if(soloScore===null||trio.some(p=>score(row[p])===null))return null;
  const ranked=[...trio].sort((a,b)=>compareRank(a,b,row));
  return {solo,ranked,soloWeighted:soloScore*2,trioBestTwo:score(row[ranked[0]])+score(row[ranked[1]])};
}
function getWinner(row){
  const s={A:score(row.A),B:score(row.B),C:score(row.C),D:score(row.D)};
  if(Object.values(s).some(v=>v===null))return "";
  if(row.mode==="개인전"){
    const min=Math.min(...Object.values(s));
    const leaders=PLAYERS.filter(p=>s[p]===min);
    if(leaders.length===1)return leaders[0];
    const ranked=[...leaders].sort((a,b)=>compareRank(a,b,row));
    return compareRank(ranked[0],ranked[1],row)!==0?ranked[0]:"무승부";
  }
  if(row.mode==="2:2"){
    const [left,right]=row.team.split(" vs ");
    const lps=left.split("+"),rps=right.split("+");
    const ls=lps.reduce((a,p)=>a+s[p],0),rs=rps.reduce((a,p)=>a+s[p],0);
    if(ls!==rs)return ls<rs?left:right;
    const lr=[...lps].sort((a,b)=>compareRank(a,b,row));
    const rr=[...rps].sort((a,b)=>compareRank(a,b,row));
    const c1=compareRank(lr[0],rr[0],row);if(c1!==0)return c1<0?left:right;
    const c2=compareRank(lr[1],rr[1],row);if(c2!==0)return c2<0?left:right;
    return "무승부";
  }
  if(row.mode==="1:3"){
    const calc=get13Calc(row);if(!calc)return "";
    if(calc.soloWeighted!==calc.trioBestTwo)return calc.soloWeighted<calc.trioBestTwo?calc.solo:row.team.split(" vs ")[1];
    return "무승부";
  }
  return "";
}
function hasTie(row){
  // 동타가 있는지 체크 (모드별)
  const s={A:score(row.A),B:score(row.B),C:score(row.C),D:score(row.D)};
  if(Object.values(s).some(v=>v===null))return false;
  if(row.mode==="개인전"){
    const min=Math.min(...Object.values(s));
    return PLAYERS.filter(p=>s[p]===min).length>1;
  }
  if(row.mode==="2:2"){
    const [left,right]=row.team.split(" vs ");
    const ls=left.split("+").reduce((a,p)=>a+s[p],0);
    const rs=right.split("+").reduce((a,p)=>a+s[p],0);
    return ls===rs;
  }
  if(row.mode==="1:3"){
    const calc=get13Calc(row);
    return calc&&calc.soloWeighted===calc.trioBestTwo;
  }
  return false;
}
function flagConfirmed(row){
  if(!state.rules.ddangEnabled)return true; // 노인정이면 항상 통과
  const s={A:score(row.A),B:score(row.B),C:score(row.C),D:score(row.D)};
  if(Object.values(s).some(v=>v===null))return false;
  // 인정이면 4명 모두 땡그랑 or OK를 눌러야 결과
  return PLAYERS.every(p=>row.flags[p].ddang||row.flags[p].ok);
}

  }

    if(ls!==rs)return ls<rs?left:right;

    const rr=[...rps].sort((a,b)=>compareRank(a,b,row));
    const c1=compareRank(lr[0],rr[0],row);if(c1!==0)return c1<0?left:right;
    const c2=compareRank(lr[1],rr[1],row);if(c2!==0)return c2<0?left:right;
    return "무승부";
  }

    return "무승부";
  }
  return "";
}
function recomputeRows(){
  const stake=parseStake(state.meta.stake);
  let carry=0;
  state.rows.forEach(row=>{
    row.carryIn=carry;
    const base=stake+carry;
    row.appliedPot=hasBirdie(row)?base*2:base;
    row.winner="";row.settlement="";
    if(row.mode==="미정")return;
    const winner=getWinner(row);
    // 땡그랑 인정이면 4명 모두 확인 전까지 결과 보류
    if(!flagConfirmed(row)){
      row.settlement="땡그랑 / OK 를 모두 확인해주세요.";return;
    }
    row.winner=winner;
    if(!winner){row.settlement="점수를 모두 입력해 주세요.";return;}
    if(winner==="무승부"){row.settlement=`무승부 · 다음 홀에 +${money(stake)} 이월`;carry+=stake;return;}
    const lines=[];const pot=row.appliedPot;
    if(row.mode==="개인전"){
      const ranked=[...PLAYERS].sort((a,b)=>compareRank(a,b,row));
      lines.push(ranked.slice(1).map(p=>`${displayName(state.names,p)} -${money(pot)}`).join("  "));
    }else if(row.mode==="2:2"){
      const [left,right]=row.team.split(" vs ");
      const losers=(winner===left?right:left).split("+");
      lines.push(losers.map(p=>`${displayName(state.names,p)} -${money(pot)}`).join("  "));
    }else if(row.mode==="1:3"){
      const calc=get13Calc(row);
      if(winner===calc.solo){
        const trio=row.team.split(" vs ")[1].split("+");
        lines.push(trio.map(p=>`${displayName(state.names,p)} -${money(pot)}`).join("  "));
      }else{
        lines.push(`${displayName(state.names,calc.solo)} -${money(pot*3)}`);
      }
    }
    if(row.par3){
      const nearWinner=PLAYERS.find(p=>row.flags[p].near);
      if(nearWinner){
        lines.push(`니어: `+PLAYERS.filter(p=>p!==nearWinner).map(p=>`${displayName(state.names,p)} -${money(10000)}`).join("  "));
      }
    }
    row.settlement=lines.join("\n");carry=0;
  });
}
function calcTotals(){
  const out={A:0,B:0,C:0,D:0};
  state.rows.forEach(row=>{
    if(!row.winner||row.winner==="무승부")return;
    const pot=row.appliedPot||0;
    if(row.mode==="개인전"){const ranked=[...PLAYERS].sort((a,b)=>compareRank(a,b,row));ranked.slice(1).forEach(p=>out[p]+=pot);}
    else if(row.mode==="2:2"){const [left,right]=row.team.split(" vs ");(row.winner===left?right:left).split("+").forEach(p=>out[p]+=pot);}
    else if(row.mode==="1:3"){const calc=get13Calc(row);if(row.winner===calc.solo){row.team.split(" vs ")[1].split("+").forEach(p=>out[p]+=pot);}else{out[calc.solo]+=pot*3;}}
    if(row.par3){const nw=PLAYERS.find(p=>row.flags[p].near);if(nw){PLAYERS.filter(p=>p!==nw).forEach(p=>out[p]+=10000);}}
  });
  return out;
}

function toggleFlag(player,flag){
  const row=state.rows.find(r=>r.hole===state.hole);if(row.locked||row.mode==="미정")return;

  if(flag==="near"){

function updateCustomRatio(changed){
  const sEl=document.getElementById('sliderSolo'),tEl=document.getElementById('slider22'),hEl=document.getElementById('slider13');
  let s=parseInt(sEl.value),t=parseInt(tEl.value),h=parseInt(hEl.value);

  if(changed==='solo'){const r=(t+h)?t/(t+h):0.5;t=Math.round(remain*r);h=remain-t;tEl.value=t;hEl.value=h;}

  else{const r=(s+t)?s/(s+t):0.5;s=Math.round(remain*r);t=remain-s;sEl.value=s;tEl.value=t;}
  state.ratio.solo=s;state.ratio.r22=t;state.ratio.r13=h;state.ratio.mode='custom';

}

function spinCurrentMode(){
  const row=state.rows.find(r=>r.hole===state.hole);
  if(row.locked||state.spinning||row.mode!=="미정")return;
  state.spinning=true;
  const btn=el.spinBtn,track=el.spinSlot;
  const teamEl=document.getElementById('teamText'),teamBox=document.getElementById('teamBox');
  btn.style.cursor='default';
  const r=state.ratio;
  let pick;
  if(r.mode==='random'){pick=MODES[Math.floor(Math.random()*MODES.length)];}
  else{
    const rand=Math.random()*100;
    const mt=rand<r.solo?'개인전':rand<r.solo+r.r22?'2:2':'1:3';
    const f=MODES.filter(m=>m.mode===mt);pick=f[Math.floor(Math.random()*f.length)];
  }
  const finalLabel=pick.mode==="2:2"?"2 vs 2":pick.mode==="1:3"?"1 vs 3":"개인전";
  const LABELS=["2 vs 2","1 vs 3","개인전"];
  const fi=LABELS.indexOf(finalLabel);
  const reel=[];
  for(let i=0;i<24;i++)reel.push(LABELS[Math.floor(Math.random()*3)]);
  reel.push(LABELS[(fi+1)%3],LABELS[(fi+2)%3],LABELS[(fi+1)%3],LABELS[(fi+2)%3],LABELS[(fi+1)%3],finalLabel);
  reel.reverse();
  teamEl.textContent='';teamBox.style.background='#f8fafc';teamBox.style.border='1px solid #e5e7eb';
  const IS='height:40px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:900;color:#fff;letter-spacing:0.3px';
  track.style.transition='none';
  track.innerHTML=reel.map(l=>`<div style="${IS}">${l}</div>`).join('');
  const startOffset=-(reel.length-1)*40;
  track.style.transform=`translateY(${startOffset}px)`;
  function gd(i){if(i<=8)return 38;if(i<=16)return 55;if(i<=24)return 80;if(i<=26)return 130;if(i<=28)return 200;if(i<=29)return 320;return 0;}
  function ge(i){if(i<reel.length-2)return 'linear';if(i===reel.length-2)return 'cubic-bezier(0.33,1,0.68,1)';return 'cubic-bezier(0.34,1.56,0.64,1)';}
  function du(i){if(i<reel.length-2)return gd(i)*0.75;if(i===reel.length-2)return 400;return 500;}
  let step=0;
  function next(){
    if(step>=reel.length-1){
      setTimeout(()=>{
        state.spinning=false;btn.style.cursor='default';btn.style.background='#047857';
        track.style.transition='none';track.innerHTML=`<div style="${IS}">${finalLabel}</div>`;track.style.transform='translateY(0)';
        row.mode=pick.mode;row.team=pick.team;row.locked=false;
        teamEl.style.color='#111827';teamEl.textContent=prettyText(pick.team,state.names);
        teamBox.style.background='#f0fdf4';teamBox.style.border='1px solid #bbf7d0';
        recomputeRows();render();
      },100);return;
    }
    step++;
    track.style.transition=`transform ${du(step)}ms ${ge(step)}`;
    track.style.transform=`translateY(${startOffset+step*40}px)`;
    setTimeout(next,gd(step));
  }
  setTimeout(next,20);
}

  window.closeTimePicker=function(){document.getElementById('timePickerOverlay').style.display='none';};

// 핸디 드럼롤
(function(){
  const VALS=Array.from({length:15},(_,i)=>i);
  let selP=null,selV=0;
  function build(el,items,sel,cb){
    el.innerHTML='';
    const pt=document.createElement('div');pt.style.height='54px';el.appendChild(pt);
    items.forEach(v=>{const d=document.createElement('div');d.className='drum-item'+(v===sel?' selected':'');d.textContent=String(v);el.appendChild(d);});
    const pb=document.createElement('div');pb.style.height='54px';el.appendChild(pb);
    el.addEventListener('scroll',()=>{const idx=Math.round(el.scrollTop/42);const val=items[Math.min(idx,items.length-1)];cb(val);el.querySelectorAll('.drum-item').forEach((d,i)=>d.classList.toggle('selected',i===idx));document.getElementById('handyDisplay').textContent=String(val);});
    setTimeout(()=>{el.scrollTop=items.indexOf(sel)*42;},80);
  }
  window.openHandyPicker=function(p){selP=p;selV=state.handy[p]||0;document.getElementById('handyPickerTitle').textContent=displayName(state.names,p)+' 핸디';document.getElementById('handyDisplay').textContent=String(selV);document.getElementById('handyPickerOverlay').style.display='flex';build(document.getElementById('handyDrum'),VALS,selV,v=>selV=v);};
  window.closeHandyPicker=function(){document.getElementById('handyPickerOverlay').style.display='none';};
  window.confirmHandyPicker=function(){if(selP)state.handy[selP]=selV;closeHandyPicker();render();};
  document.getElementById('handyPickerOverlay').addEventListener('click',function(e){if(e.target===this)closeHandyPicker();});
})();

function getChosung(str){const cho=['ㄱ','ㄲ','ㄴ','ㄷ','ㄸ','ㄹ','ㅁ','ㅂ','ㅃ','ㅅ','ㅆ','ㅇ','ㅈ','ㅉ','ㅊ','ㅋ','ㅌ','ㅍ','ㅎ'];return [...str].map(c=>{const code=c.charCodeAt(0)-0xAC00;if(code<0||code>11171)return c;return cho[Math.floor(code/588)];}).join('');}
const courseInput=document.getElementById('courseInput'),courseList=document.getElementById('courseList');
courseInput.addEventListener('input',function(){const q=this.value.trim();if(!q){courseList.style.display='none';return;}const isCS=/^[ㄱ-ㅎ]+$/.test(q);const res=GOLF_COURSES.filter(n=>isCS?getChosung(n).startsWith(q):n.includes(q)).slice(0,8);if(!res.length){courseList.style.display='none';return;}courseList.innerHTML=res.map(n=>`<div class="autocomplete-item" onmousedown="selectCourse('${n.replace(/'/g,"\\'")}')">${n}</div>`).join('');courseList.style.display='block';});
courseInput.addEventListener('blur',()=>setTimeout(()=>{courseList.style.display='none';},150));
function selectCourse(n){courseInput.value=n;courseList.style.display='none';render();}
window.selectCourse=selectCourse;
window.changeScore=changeScore;window.toggleFlag=toggleFlag;window.setHole=setHole;window.spinCurrentMode=spinCurrentMode;

setRatio('even');
render();
